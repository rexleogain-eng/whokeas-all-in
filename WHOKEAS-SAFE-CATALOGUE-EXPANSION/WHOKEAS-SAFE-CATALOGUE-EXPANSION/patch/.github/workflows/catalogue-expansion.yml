name: WHOKEAS Catalogue Expansion

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

concurrency:
  group: whokeas-catalogue-expansion
  cancel-in-progress: false

jobs:
  expand-catalogue:
    if: vars.ENABLE_CATALOGUE_EXPANSION == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run one safe catalogue cycle
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CATALOGUE_CRON_URL: ${{ secrets.CATALOGUE_CRON_URL }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ] || [ -z "${CATALOGUE_CRON_URL:-}" ]; then
            echo "CRON_SECRET or CATALOGUE_CRON_URL is not configured."
            exit 1
          fi
          curl --fail-with-body \
            --retry 3 \
            --retry-delay 20 \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CATALOGUE_CRON_URL}"
